services:
  nginx:
    # 1. Tell Compose where to find the Dockerfile to build the image
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    
    # 2. Give the running container a clear name
    container_name: nginx
    
    # 3. Map your VM's physical port to the container's inner secure port
    ports:
      - "443:443"
    
    # 4. Set up persistent storage volumes for your web files
    volumes:
      - wordpress_data:/var/www/html
    
    # 5. Ensure the container restarts automatically if it crashes
    restart: always

volumes:
  wordpress_data:
    name: wordpress_data