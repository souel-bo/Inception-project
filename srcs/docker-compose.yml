version: '3.8'

services:
  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    # Rule: Containers must restart in case of a crash
    restart: on-failure
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network

  wordpress:
    build:
      context: ./requirements/wordpress
    container_name: wordpress
    restart: on-failure
    env_file:
      - .env
    volumes:
      - wp_data:/var/www/wordpress
    networks:
      - inception_network

  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    restart: on-failure
    depends_on:
      - wordpress
    volumes:
      - wp_data:/var/www/wordpress:ro
    ports:
      - "443:443"
    networks:
      - inception_network

# Rule: Must use Docker named volumes for persistent storage
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      # Rule: Must store data inside /home/login/data (Replace 'your_username')
      device: /home/sfyn/data/mariadb

  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      # Rule: Must store data inside /home/login/data (Replace 'your_username')
      device: /home/sfyn/data/wordpress

# Rule: A docker-network that establishes the connection
networks:
  inception_network:
    driver: bridge