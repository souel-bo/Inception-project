services:
  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    restart: on-failure
    env_file:
      - .env
      - ../secrets/mariadb_credentials/db_credentials.txt
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network

  wordpress:
    build:
      context: ./requirements/wordpress
    container_name: wordpress
    restart: on-failure
    env_file:
      - .env
      - ../secrets/wordpress_credentials/wp_credentials.txt
    volumes:
      - wp_data:/var/www/wordpress
    networks:
      - inception_network

  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    restart: on-failure
    depends_on:
      - wordpress
    volumes:
      - wp_data:/var/www/wordpress:ro
    ports:
      - "443:443"
    networks:
      - inception_network

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/sfyn/data/mariadb

  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/sfyn/data/wordpress

networks:
  inception_network:
    driver: bridge